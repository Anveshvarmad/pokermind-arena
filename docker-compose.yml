services:
  postgres:
    image: postgres:16-alpine
    container_name: pokermind-postgres
    environment:
      POSTGRES_USER: pokermind
      POSTGRES_PASSWORD: pokermind
      POSTGRES_DB: pokermind
    ports:
      - "5432:5432"
    volumes:
      - pokermind-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokermind -d pokermind"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: pokermind-backend
    environment:
      DATABASE_URL: postgresql+psycopg://pokermind:pokermind@postgres:5432/pokermind
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: pokermind-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pokermind-postgres-data:
